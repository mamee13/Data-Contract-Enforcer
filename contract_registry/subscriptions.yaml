# Contract registry subscriptions
# Each entry represents a consumer's declared dependency on a contract.

subscriptions:
  - contract_id: week1-intent-records
    subscriber_id: week2-courtroom
    subscriber_team: week2
    fields_consumed: [code_refs, governance_tags, created_at]
    breaking_fields:
      - field: code_refs.file
        reason: verdict.target_ref must resolve to a code_refs.file path
    validation_mode: AUDIT
    registered_at: '2026-03-31T09:00:00Z'
    contact: week2-team@org.com

  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change breaks ordering
      - field: doc_id
        reason: primary key for node identity in lineage graph
    validation_mode: ENFORCE
    registered_at: '2026-03-31T09:00:00Z'
    contact: week4-team@org.com

  - contract_id: week4-lineage
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [nodes, edges, git_commit]
    breaking_fields:
      - field: nodes
        reason: lineage traversal depends on node metadata for blame chain
      - field: edges
        reason: lineage traversal depends on edge connectivity
    validation_mode: AUDIT
    registered_at: '2026-03-31T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: week5-event-records
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [event_id, event_type, payload, recorded_at, occurred_at]
    breaking_fields:
      - field: event_type
        reason: event routing and schema validation keyed on event_type
      - field: payload
        reason: payload schema validation per event_type
    validation_mode: AUDIT
    registered_at: '2026-03-31T09:00:00Z'
    contact: week7-team@org.com

  - contract_id: langsmith-traces
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [id, run_type, start_time, end_time, total_tokens]
    breaking_fields:
      - field: end_time
        reason: trace duration checks require end_time > start_time
      - field: total_tokens
        reason: total_tokens = prompt_tokens + completion_tokens
    validation_mode: AUDIT
    registered_at: '2026-03-31T09:00:00Z'
    contact: week7-team@org.com
