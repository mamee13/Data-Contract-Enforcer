- check_id: not_null_completion_tokens
  column_name: completion_tokens
  check_type: not_null
  severity: CRITICAL
- check_id: range_completion_tokens
  column_name: completion_tokens
  check_type: range
  params:
    min: 0.0
    max: 0.0
  severity: WARN
- check_id: mean_drift_completion_tokens
  column_name: completion_tokens
  check_type: drift
